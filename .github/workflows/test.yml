name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
        test_type:
          - tests_unit
        jupyterhub:
          - "==4.1.5"
          - ">=5.0.0"
    steps:
    # https://github.com/actions/checkout/releases/tag/v7.0.0
    - uses: actions/checkout@v7

    - name: Setup Python
      # https://github.com/actions/setup-python/releases/tag/v6.3.0
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      # https://github.com/astral-sh/setup-uv/releases/tag/v8.2.0
      uses: astral-sh/setup-uv@v8

    - name: Install dependencies
      run: |
        if [ "${{ matrix.jupyterhub }}" = "==4.1.5" ]; then
          uv sync --group test-jupyterhub-4 --extra dev
        else
          uv sync --group test-jupyterhub-5 --extra dev
        fi

    - name: uv pip list
      run: uv pip list

    - name: Run Tests
      run: |
        GROUP_FLAG=""
        if [ "${{ matrix.jupyterhub }}" = "==4.1.5" ]; then
          GROUP_FLAG="--group test-jupyterhub-4"
        else
          GROUP_FLAG="--group test-jupyterhub-5"
        fi
        uv run $GROUP_FLAG --extra dev pytest jhub_apps/tests/${{ matrix.test_type }} -vvv -s --log-cli-level=INFO
